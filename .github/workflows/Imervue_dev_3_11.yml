name: Imervue Dev Python3.11

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: read

jobs:
  build_dev_version:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v5.6.0
      with:
        python-version: "3.11"
    - name: Install OpenGL
      run: |
        sudo apt-get update
        sudo apt-get install -y \
        xvfb \
        libgl1-mesa-dev \
        libgl1-mesa-dri \
        mesa-utils \
        libglu1-mesa-dev \
        freeglut3-dev
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel
        pip install -r dev_requirements.txt
    - name: Build Imervue
      run: pyinstaller --noconfirm --onedir --windowed --icon "Imervue.ico" --name "Imervue" --add-data "Imervue.ico;." --paths ".venv" --hidden-import "imageio" --copy-metadata "imageio" --distpath output "Imervue/__main__.py"
    - name: Debug run Imervue
      run: xvfb-run -s "-screen 0 1280x1024x24" output/Imervue/Imervue.exe --debug --software_opengl