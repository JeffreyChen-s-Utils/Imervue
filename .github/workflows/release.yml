name: Release

# Runs after a PR merges into main (i.e. a direct push to main). The
# job graph is idempotent on the version field of pyproject.toml — if
# the version was not bumped in the merged PR, every gated job becomes
# a no-op so cosmetic / docs / refactor merges do not burn CI minutes
# nor risk re-uploading an unchanged build to PyPI.
on:
  push:
    branches: [ "main" ]

# Workflow-level permissions are intentionally minimal — only the
# create-release job needs ``contents: write`` (to push a tag and
# upload the GitHub Release asset). Hoisting that scope to the job
# keeps every other job at the default read-only token, matching
# the principle of least privilege the supply-chain rules expect.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------
  # Decide whether this push contains a version bump worth releasing.
  # The check is "does a git tag matching v<pyproject version> already
  # exist on the remote?" — if not, the bump is new and we proceed.
  # ---------------------------------------------------------------
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: read
        shell: bash
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - id: diff
        shell: bash
        run: |
          if git rev-parse "refs/tags/${{ steps.read.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.read.outputs.tag }} already exists — skipping release."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${{ steps.read.outputs.tag }} is new — releasing."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------
  # Build sdist + wheel and upload to PyPI via twine. Uses an API
  # token stored in the repository's PYPI_API_TOKEN secret; the
  # __token__ username is the canonical literal for token auth.
  # ---------------------------------------------------------------
  publish-pypi:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build & twine
        run: python -m pip install --upgrade pip build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Verify artifacts
        run: python -m twine check dist/*
      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload --non-interactive dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/

  # ---------------------------------------------------------------
  # Build a Windows standalone EXE via Nuitka and stash it as an
  # action artifact for the downstream create-release job to attach.
  # The Nuitka invocation mirrors nuitka.md §2.1 verbatim — see that
  # doc for the rationale behind every flag.
  # ---------------------------------------------------------------
  build-exe-windows:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime deps
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel
          # requirements.txt ends with the self-reference "Imervue"
          # for end-users; strip it here so we don't pull the
          # to-be-replaced version from PyPI.
          grep -vE '^(Imervue|Imervue_dev)$' requirements.txt > _ci_req.txt
          pip install -r _ci_req.txt
          pip install nuitka ordered-set zstandard
      - name: Run Nuitka
        shell: cmd
        run: |
          python -m nuitka ^
            --standalone ^
            --windows-console-mode=disable ^
            --enable-plugin=pyside6 ^
            --python-flag=-m ^
            --include-package=qt_material ^
            --include-package=imageio ^
            --include-package=rawpy ^
            --include-package-data=qt_material ^
            --include-package-data=imageio ^
            --include-package-data=rawpy ^
            --include-data-dir=plugins=plugins ^
            --noinclude-data-files=plugins/*/models/* ^
            --noinclude-data-files=*.onnx ^
            --noinclude-data-files=*.pt ^
            --noinclude-data-files=*.pth ^
            --noinclude-data-files=*.safetensors ^
            --noinclude-data-files=*.gguf ^
            --noinclude-data-files=exe/*.log ^
            --noinclude-data-files=exe/*.json ^
            --include-data-dir=exe=exe ^
            --include-data-files=THIRD_PARTY_LICENSES.md=THIRD_PARTY_LICENSES.md ^
            --include-data-files=LICENSE=LICENSE ^
            --module-parameter=torch-disable-jit=yes ^
            --nofollow-import-to=pytest ^
            --nofollow-import-to=doctest ^
            --nofollow-import-to=rembg ^
            --windows-icon-from-ico=exe\Imervue.ico ^
            --output-filename=Imervue.exe ^
            --output-dir=build_nuitka ^
            --remove-output ^
            --assume-yes-for-downloads ^
            Imervue
      - name: Zip standalone bundle
        shell: pwsh
        run: |
          $version = "${{ needs.check-version.outputs.version }}"
          $zipName = "Imervue-windows-x64-$version.zip"
          Compress-Archive -Path build_nuitka\Imervue.dist\* -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: imervue-windows-exe
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Tag the commit and publish a GitHub Release with the EXE zip.
  # Only fires after both PyPI publish AND EXE build succeed, so a
  # half-released version (PyPI-only or EXE-only) never gets a tag.
  # ---------------------------------------------------------------
  create-release:
    needs: [check-version, publish-pypi, build-exe-windows]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      # Job-scoped write so other jobs in this workflow keep a
      # read-only token; only the release publisher needs to mutate
      # the repo (push tag + upload release asset).
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: imervue-windows-exe
          path: ./release-assets
      # Pinned to the v2 tag's full commit SHA — defends against a
      # compromised tag re-pointing at a malicious revision. Refresh
      # by re-running ``gh api repos/softprops/action-gh-release/git/refs/tags/v2``
      # when bumping to a new release.
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: ${{ needs.check-version.outputs.tag }}
          generate_release_notes: true
          files: ./release-assets/*
