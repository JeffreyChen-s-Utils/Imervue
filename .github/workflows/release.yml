# Triggers when a PR is merged into main.
#
# Required repository secret:
#   PYPI_API_TOKEN  — PyPI API token (starts with `pypi-`). Create one at
#                     https://pypi.org/manage/account/token/ scoped to this project.
#
# Bump type is read from PR labels:
#   release:major   — 1.0.29 -> 2.0.0
#   release:minor   — 1.0.29 -> 1.1.0
#   release:patch   — 1.0.29 -> 1.0.30   (also the default when no label present)
#
# Branch protection note: this workflow pushes a `Bump version` commit and a tag
# directly to main. If main has required-PR protection, allow
# `github-actions[bot]` to bypass, or swap the token for a PAT with bypass rights.

name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine bump type from PR labels
        id: bump
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q '"release:major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"release:minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in pyproject.toml
        id: version
        env:
          BUMP: ${{ steps.bump.outputs.type }}
        run: |
          python - <<'PY'
          import os, pathlib, re
          bump = os.environ["BUMP"]
          path = pathlib.Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          m = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', text, re.M)
          if m is None:
              raise SystemExit("version field not found in pyproject.toml")
          major, minor, patch = (int(g) for g in m.groups())
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1
          new = f"{major}.{minor}.{patch}"
          text = re.sub(
              r'^version\s*=\s*"[^"]+"',
              f'version = "{new}"',
              text,
              count=1,
              flags=re.M,
          )
          path.write_text(text, encoding="utf-8")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"new={new}\n")
          print(f"Bumped to {new} ({bump})")
          PY

      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "Bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git tag -a "v${{ steps.version.outputs.new }}" \
                  -m "Release v${{ steps.version.outputs.new }}"
          git push origin main
          git push origin "v${{ steps.version.outputs.new }}"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload to PyPI with twine
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
          python -m twine upload dist/*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.new }}" \
            dist/* \
            --title "v${{ steps.version.outputs.new }}" \
            --generate-notes
