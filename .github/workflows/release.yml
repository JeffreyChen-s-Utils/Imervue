# Triggers when a PR is merged into main.
#
# Required repository secret:
#   PYPI_API_TOKEN  — PyPI API token (starts with `pypi-`). Create one at
#                     https://pypi.org/manage/account/token/ scoped to this project.
#
# Bump type is read from PR labels:
#   release:major   — 1.0.29 -> 2.0.0
#   release:minor   — 1.0.29 -> 1.1.0
#   release:patch   — 1.0.29 -> 1.0.30   (also the default when no label present)
#
# Job graph:
#   1. ``release``           — bump version, commit, tag, build wheel,
#                              upload to PyPI. Emits ``new`` (the new
#                              version string) as a job output so the
#                              downstream jobs can pin to the same tag.
#   2. ``build-exe-windows`` — checks out the freshly-pushed tag and
#                              builds a standalone Nuitka EXE on a
#                              Windows runner.
#   3. ``publish-release``   — gathers the EXE artifact and creates the
#                              GitHub Release with the wheel + EXE zip
#                              attached.
#
# Branch protection note: the release job pushes a `Bump version`
# commit and a tag directly to main. If main has required-PR
# protection, allow ``github-actions[bot]`` to bypass, or swap the
# token for a PAT with bypass rights.

name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

# Workflow-level token stays read-only. Only the jobs that publish a
# tag / release flip themselves to ``contents: write`` — every other
# step runs on a least-privilege token.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------
  # Bump version + push commit/tag + build & upload PyPI artefacts.
  # Outputs ``new`` (the resulting version string) so the downstream
  # Windows-EXE job can clone the matching tag.
  # ---------------------------------------------------------------
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new: ${{ steps.version.outputs.new }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine bump type from PR labels
        id: bump
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q '"release:major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"release:minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in pyproject.toml
        id: version
        env:
          BUMP: ${{ steps.bump.outputs.type }}
        run: |
          python - <<'PY'
          import os, pathlib, re
          bump = os.environ["BUMP"]
          path = pathlib.Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          m = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', text, re.M)
          if m is None:
              raise SystemExit("version field not found in pyproject.toml")
          major, minor, patch = (int(g) for g in m.groups())
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1
          new = f"{major}.{minor}.{patch}"
          text = re.sub(
              r'^version\s*=\s*"[^"]+"',
              f'version = "{new}"',
              text,
              count=1,
              flags=re.M,
          )
          path.write_text(text, encoding="utf-8")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"new={new}\n")
          print(f"Bumped to {new} ({bump})")
          PY

      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "Bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git tag -a "v${{ steps.version.outputs.new }}" \
                  -m "Release v${{ steps.version.outputs.new }}"
          git push origin main
          git push origin "v${{ steps.version.outputs.new }}"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload to PyPI with twine
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
          python -m twine upload dist/*

      - name: Stash PyPI artefacts for the release publisher
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/

  # ---------------------------------------------------------------
  # Build a Windows standalone EXE via Nuitka and stash it as an
  # action artifact for the publisher job to attach. The Nuitka
  # command mirrors nuitka.md §2.1 verbatim — see that doc for the
  # rationale behind every flag.
  # ---------------------------------------------------------------
  build-exe-windows:
    needs: release
    runs-on: windows-latest
    steps:
      - name: Checkout the freshly-pushed tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime deps
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel
          # requirements.txt ends with the self-reference "Imervue"
          # for end-users; strip it here so we don't pull the
          # to-be-replaced version from PyPI.
          grep -vE '^(Imervue|Imervue_dev)$' requirements.txt > _ci_req.txt
          pip install -r _ci_req.txt
          pip install nuitka ordered-set zstandard
      - name: Run Nuitka
        shell: cmd
        run: |
          python -m nuitka ^
            --standalone ^
            --windows-console-mode=disable ^
            --enable-plugin=pyside6 ^
            --python-flag=-m ^
            --include-package=qt_material ^
            --include-package=imageio ^
            --include-package=rawpy ^
            --include-package-data=qt_material ^
            --include-package-data=imageio ^
            --include-package-data=rawpy ^
            --include-data-dir=plugins=plugins ^
            --noinclude-data-files=plugins/*/models/* ^
            --noinclude-data-files=*.onnx ^
            --noinclude-data-files=*.pt ^
            --noinclude-data-files=*.pth ^
            --noinclude-data-files=*.safetensors ^
            --noinclude-data-files=*.gguf ^
            --noinclude-data-files=exe/*.log ^
            --noinclude-data-files=exe/*.json ^
            --include-data-dir=exe=exe ^
            --include-data-files=THIRD_PARTY_LICENSES.md=THIRD_PARTY_LICENSES.md ^
            --include-data-files=LICENSE=LICENSE ^
            --module-parameter=torch-disable-jit=yes ^
            --nofollow-import-to=pytest ^
            --nofollow-import-to=doctest ^
            --nofollow-import-to=rembg ^
            --windows-icon-from-ico=exe\Imervue.ico ^
            --output-filename=Imervue.exe ^
            --output-dir=build_nuitka ^
            --remove-output ^
            --assume-yes-for-downloads ^
            Imervue
      - name: Zip standalone bundle
        shell: pwsh
        run: |
          $version = "${{ needs.release.outputs.new }}"
          $zipName = "Imervue-windows-x64-$version.zip"
          Compress-Archive -Path build_nuitka\Imervue.dist\* -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: imervue-windows-exe
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Create the GitHub Release with the PyPI artefacts AND the
  # Windows EXE zip attached. Runs only after both upstream jobs
  # succeed so a half-released version (PyPI-only or EXE-only)
  # never gets an associated GitHub Release.
  # ---------------------------------------------------------------
  publish-release:
    needs: [release, build-exe-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout the freshly-pushed tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new }}
      - name: Download PyPI artefacts
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: ./dist
      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: imervue-windows-exe
          path: ./release-assets
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.release.outputs.new }}" \
            dist/* ./release-assets/*.zip \
            --title "v${{ needs.release.outputs.new }}" \
            --generate-notes
