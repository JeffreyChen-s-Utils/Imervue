name: Tests

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    # ``experimental`` toggles continue-on-error so a Python release with
    # missing upstream wheels (PySide6, rawpy, etc.) does not block CI.
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        experimental: [false]
        include:
          - python-version: "3.14"
            experimental: true

    name: Python ${{ matrix.python-version }}${{ matrix.experimental && ' (experimental)' || '' }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel
        pip install PySide6 Pillow PyOpenGL numpy rawpy imageio send2trash watchdog defusedxml pytest pytest-cov
    - name: Run tests
      # ``PYTHONFAULTHANDLER=1`` + ``-X faulthandler`` makes the
      # interpreter print a native traceback on SIGSEGV / fatal
      # signals — keep these on so any future teardown crash is
      # diagnosable rather than an opaque exit 1.
      # ``PYTHONUNBUFFERED=1`` keeps stdout / stderr live so the
      # crash trace actually reaches the GH Actions log before
      # the process dies.
      #
      # ``-p no:unraisableexception`` disables pytest's plugin
      # that calls ``gc_collect_harder()`` during
      # ``_ensure_unconfigure`` (i.e. AFTER every session fixture
      # has torn down). That explicit ``gc.collect`` walks the
      # full object graph and hits stale shiboken wrappers from
      # the thousands of QObjects this suite creates — segfault,
      # process killed, summary banner never flushed. The plugin
      # exists to surface exceptions raised inside ``__del__``;
      # in a PySide6-heavy suite those are unavoidable false
      # positives on shutdown, so disabling it on CI is the
      # right call.
      env:
        PYTHONFAULTHANDLER: "1"
        PYTHONUNBUFFERED: "1"
      run: python -X faulthandler -u -m pytest tests/ -v --tb=short -W ignore::DeprecationWarning -p no:unraisableexception
