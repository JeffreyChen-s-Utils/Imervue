name: Tests

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    # ``experimental`` toggles continue-on-error so a Python release with
    # missing upstream wheels (PySide6, rawpy, etc.) does not block CI.
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        experimental: [false]
        include:
          - python-version: "3.14"
            experimental: true

    name: Python ${{ matrix.python-version }}${{ matrix.experimental && ' (experimental)' || '' }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel
        pip install PySide6 Pillow PyOpenGL numpy rawpy imageio send2trash watchdog pytest pytest-cov
    - name: Run tests
      # ``PYTHONFAULTHANDLER=1`` + ``-X faulthandler`` makes the
      # interpreter print a native traceback on SIGSEGV / fatal
      # signals — without it, a Qt teardown crash on the headless
      # runner just exits with code 1 and an empty log.
      # ``PYTHONUNBUFFERED=1`` keeps stdout / stderr live so the
      # crash trace actually reaches the GH Actions log before the
      # process dies. ``-p no:faulthandler`` is NOT used; we want
      # the default pytest faulthandler hook active.
      env:
        PYTHONFAULTHANDLER: "1"
        PYTHONUNBUFFERED: "1"
      run: python -X faulthandler -u -m pytest tests/ -v --tb=short -W ignore::DeprecationWarning
