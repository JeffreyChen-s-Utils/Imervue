# SonarCloud analysis configuration.
#
# Test code is held to a lighter bar than production code (the same stance the
# project already takes for bandit / Codacy, which exclude tests/**). The rules
# below fire only on test scaffolding — Qt-API method names on fake widgets
# (S100), exact float asserts (S1244), intentionally empty stub methods (S1186),
# fixture "password" literals (S2068), identity-passthrough `is` checks (S5796),
# throwaway unpacked locals (S1481), and a couple of test-only style rules — so
# they are ignored under tests/** rather than worked around in every test.
sonar.issue.ignore.multicriteria=t1,t2,t3,t4,t5,t6,t7,t8,t9,t10

sonar.issue.ignore.multicriteria.t1.ruleKey=python:S100
sonar.issue.ignore.multicriteria.t1.resourceKey=tests/**

sonar.issue.ignore.multicriteria.t2.ruleKey=python:S1244
sonar.issue.ignore.multicriteria.t2.resourceKey=tests/**

sonar.issue.ignore.multicriteria.t3.ruleKey=python:S1186
sonar.issue.ignore.multicriteria.t3.resourceKey=tests/**

sonar.issue.ignore.multicriteria.t4.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.t4.resourceKey=tests/**

sonar.issue.ignore.multicriteria.t5.ruleKey=python:S5796
sonar.issue.ignore.multicriteria.t5.resourceKey=tests/**

sonar.issue.ignore.multicriteria.t6.ruleKey=python:S1481
sonar.issue.ignore.multicriteria.t6.resourceKey=tests/**

sonar.issue.ignore.multicriteria.t7.ruleKey=python:S7498
sonar.issue.ignore.multicriteria.t7.resourceKey=tests/**

sonar.issue.ignore.multicriteria.t8.ruleKey=python:S7500
sonar.issue.ignore.multicriteria.t8.resourceKey=tests/**

sonar.issue.ignore.multicriteria.t9.ruleKey=python:S5655
sonar.issue.ignore.multicriteria.t9.resourceKey=tests/**

sonar.issue.ignore.multicriteria.t10.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.t10.resourceKey=tests/**
